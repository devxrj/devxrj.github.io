<!DOCTYPE html>
<html>

<head>
<title>Edit File</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/util_h.js"></script>
</head>

<body style="background-color:white;">

<div id="elem_cont" style="display:none;">

<div id="elem_menus">
<div style="cursor:pointer;display:inline-block;width:48%;" onclick="show_opts_m();"><br></div>
<div style="cursor:pointer;display:inline-block;width:48%;" onclick="show_opts();"><br></div>
</div>

<div style="text-align:center;">
 <img id="elem_im_quest" style="border:1px solid red;display:none">

 <div id="elem_ed" style="display:none;text-align:left;">
 <textarea id="elem_ta" style="width:100%;" spellcheck="false"></textarea>
 <br>
 <button id="elem_btn_atualizar" onclick="edit_file();">Update</button>
 <span id="elem_ed_res" style="margin-left:5px"></span>
 </div>

</div>

</div>

<div id="elem_msg" style="display:none;position:fixed;z-index:1;padding-top:50px;left:0;top:0;width:100%;height:100%;background-color:rgba(0,0,0,0.4);" onclick="if (event.target==this) this.style.display='none';">
<div id="elem_dv_msg" style="color:gray;background-color:#fefefe;margin:auto;border:1px solid #888;width:60%;font-family:arial,sans-serif;font-size:15px;">
<div style="text-align:center;border-bottom:1px solid;"><span style="color:black">Options</span></div>
<div id="elem_menu_opts" style="max-height:500px;overflow-y:auto;"></div>
</div>
</div>

<div id="elem_msg2" style="display:none;position:fixed;z-index:1;padding-top:50px;left:0;top:0;width:100%;height:100%;background-color:rgba(0,0,0,0.4);" onclick="if (event.target==this) this.style.display='none';">
<div id="elem_dv_msg2" style="color:gray;background-color:#fefefe;margin:auto;border:1px solid #888;width:60%;font-family:arial,sans-serif;font-size:15px;">
<div style="text-align:center;border-bottom:1px solid;"><span style="color:black">Options</span></div>
<div id="elem_menu_opts2" style="max-height:500px;overflow-y:auto;"></div>
</div>
</div>

<script>

function is_mob()
{ 
 return (screen.width < 600); 
}

function is_txt(fn)
{
 return ["txt", "html", "htm", "xml"].includes(fn.split(".").pop().toLowerCase());
}

function get_file(id)
{
 lst_id_file = id;
 elem_ed.style.display = "none";
 elem_im_quest.style.display = "inline";
 elem_im_quest.src = "carregando.gif";

 if (cch[id]["url"]) return get_file_aux(id);

 get_tkn(t => {
  ajax_r(url_gd_file_byte(id), 0,
  (data) => {
  cch[id]["blob"] = data;
  cch[id]["url"] = URL.createObjectURL(data);
  get_file_aux(id);
  }, ["a2", t], "b");
 });
}

function get_file_aux(id)
{
 elem_im_quest.style.display = "none"; 

 var fn = cch[id]["name"];
 var cnf = get_config(fn.substring(0,fn.lastIndexOf(".")));
 var fn_display = cnf[1] + fn.substring(fn.lastIndexOf("."));

 elem_ed.style.display = "block";
 elem_ta.style.height = is_mob()? "450px" : "500px" ;
 const reader = new FileReader();
 reader.onload = (e) => elem_ta.value = e.target.result;
 reader.readAsText(cch[id]["blob"]);
 elem_ta.title = fn_display; 

}

function edit_file()
{
 get_tkn(t => { 

 const blob_ta = new Blob([elem_ta.value.trim().replaceAll("\n","\r\n")], {type: "text/plain"});
 ajax_r(url_gd_file_upd(lst_id_file), ["PATCH", blob_ta], a => elem_ed_res.innerHTML = (new Date()).getMilliseconds(),["a2", t, "ct", blob_ta.type]);
 
 });
}

function new_file()
{
 get_tkn(t => { 

 var metadata = {"name": "t_" + (new Date()).getTime() + ".txt","mimeType": "text/plain","parents": [m_sid]};
 var arr = [11,"metadata",new Blob([JSON.stringify(metadata)], {type: "application/json"}),
              "file", new Blob(["new\r\nfile\r\nfrom api"], {type: "text/plain"}) ];
 ajax_r(url_gd_file_new(), arr, (a) => alert(a.id), ["a2",t]);
 
 });
}


function down_blob()
{
 var a = document.createElement("a");
 a.href =  cch[lst_id_file]["url"]; 
 a.download = elem_ta.title;
 a.click();
 a.remove();
}


function show_opts_m()
{
 elem_msg2.style.display='block';
}

function show_opts()
{
 elem_menu_opts.innerHTML = "";

 add_opts_it(elem_menu_opts, "Info: " + cch[m_sid]["files"].length + " Files");
 add_opts_it(elem_menu_opts, "New File", () => {
   new_file();
   elem_msg.style.display = "none";
  });

 if (lst_id_file != "" && cch[lst_id_file]["url"]) add_opts_it(elem_menu_opts, "Download", () => {
   down_blob();
   elem_msg.style.display = "none";
  });
 
 add_opts_it(elem_menu_opts, get_lnk_blb(lst_id_file), dvclnk);
 add_opts_it(elem_menu_opts, get_lnk_gd_dir(m_sid), dvclnk);
 add_opts_it(elem_menu_opts, get_lnk_gd_file(lst_id_file), dvclnk);
 add_opts_it(elem_menu_opts, get_lnk_ext(lst_id_file), dvclnk);

 elem_msg.style.display = "block";
}

function dvclnk(elem, evt)
{
 if (!is_mob()) return;
 var ls = elem.getElementsByTagName("a");
 if (ls.length == 0) return;
 if (evt.target.tagName == "DIV") ls[0].click();
}

function add_opts_it(elem, name, fn_click, id)
{
 if (name == "") return;
 var new_it = document.createElement("div");
 if (id) new_it.id = id;
 if (fn_click) new_it.onclick = () => {fn_click(new_it, event);}; 
 new_it.innerHTML = "<span style='cursor:default;'>" + name + "</span>";
 new_it.style.cssText = "padding:5px;word-wrap:break-word;";
 elem.appendChild(new_it);
 if (new_it.previousElementSibling) new_it.previousElementSibling.style.borderBottom = "1px solid";
}

function get_lnk_gd_dir(id)
{
 if (id == "") return "";
 var url_gd = url_gd_view_folder(id);
 return `
   <img src="${get_ico_lnk(url_gd)}" width="16" height="16" style="vertical-align:middle;margin-right:5px;" onerror="this.src='${get_ico_lnk(0)}'">
   <a href="${url_gd}" target="_blank">${cch[id]["name"]}</a>
   `;
}

function get_lnk_blb(id)
{
 if ((id == "") || (cch[id]["url"] == undefined)) return "";
 return `
   <img src="${get_ico_lnk(1)}" width="16" height="16" style="vertical-align:middle;margin-right:5px;" onerror="this.src='${get_ico_lnk(0)}'">
   <a target="_blank" href="${cch[id]["url"]}">Lnk Blob</a>
   `;
}

function get_lnk_sel(id)
{
 if (id == "") return "";
 var url_s = location.pathname + "?sid=s" + id + "&n=" +  encodeURIComponent(cch[id]["name"]);
 return `
   <img src="${get_ico_lnk(1)}" width="16" height="16" style="vertical-align:middle;margin-right:5px;" onerror="this.src='${get_ico_lnk(0)}'">
   <a href="${url_s}">Select Mode</a>
   `;
}   

function get_lnk_gd_file(id)
{
 if (id == "") return "";
 var url_gd = url_gd_view_file(id);
 var fn = cch[id]["name"];
 var cnf = get_config(fn.substring(0,fn.lastIndexOf(".")));
 var fn_display = cnf[1] + fn.substring(fn.lastIndexOf("."));
 return `
   <img src="${get_ico_lnk(url_gd)}" width="16" height="16" style="vertical-align:middle;margin-right:5px;" onerror="this.src='${get_ico_lnk(0)}'">
   <a target="_blank" href="${url_gd}">${fn_display}</a>  
   `;
}

function get_lnk_ext(id)
{
 if (id == "") return "";
 var fn = cch[id]["name"];
 var cnf = get_config(fn.substring(0,fn.lastIndexOf(".")));
 var href_ext = cnf[2];
 return (cnf[0] == 1) ? "" : `
   <img src="${get_ico_lnk(href_ext)}" width="16" height="16" style="vertical-align:middle;margin-right:5px;" onerror="this.src='${get_ico_lnk(0)}'">
   <a target="_blank" href="${href_ext}">Lnk Externo</a>
   `;
}


function url_gd_list_all(id)
{
 return `https://www.googleapis.com/drive/v3/files?q=%27${id}%27+in+parents+and+trashed%3Dfalse&fields=files(id,name,mimeType)&orderBy=name&pageSize=1000`
}

function  url_gd_list_files(id)
{
 return `https://www.googleapis.com/drive/v3/files?q=%27${id}%27+in+parents+and+trashed%3Dfalse+and+mimeType!%3D%27application/vnd.google-apps.folder%27&fields=files(id,name)&orderBy=name&pageSize=1000`
}

function url_gd_file_info(id)
{
 return `https://www.googleapis.com/drive/v3/files/${id}`;
}

function url_gd_file_byte(id)
{
 return `https://www.googleapis.com/drive/v3/files/${id}?alt=media`;
}

function url_gd_view_file(id)
{
 return `https://drive.google.com/file/d/${id}/view`;
}

function url_gd_view_folder(id)
{
 return `https://drive.google.com/drive/folders/${id}`;
}

function url_gd_file_upd(id)
{
 return `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`;
}

function url_gd_file_new()
{
 return `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`;
}


var cch = {};
var lst_id_file = "";
var m_sid = get_p("sid").substring(1);

get_tkn(t => {

var m_fid = get_p("fid").substring(1);
var arg_n = get_p("n");
var root_name = (arg_n == "") ? "." : arg_n;

if (m_sid != ""){
 cch[m_sid] = {};
 cch[m_sid]["name"] = root_name;
 ajax_r(url_gd_list_files(m_sid) , 0,
 (data) => { 
 elem_cont.style.display = "block";
 var tab = data["files"].filter(o => !o["name"].startsWith("--") && is_txt(o["name"]));
 cch[m_sid]["files"] = tab;
 tab.forEach(o => {
   cch[o["id"]] = {};
   cch[o["id"]]["name"] = o["name"];
   var fn = o["name"];
   var cnf = get_config(fn.substring(0,fn.lastIndexOf(".")));
   add_opts_it(elem_menu_opts2, cnf[1], (d) => {
     d.firstElementChild.style.color = "blue";
     get_file(o["id"]);
     elem_msg2.style.display = "none";
     }); 
  });
 }, ["a2", t]);
}


});



</script>

</body>
</html>
