<!DOCTYPE html>
<html>

<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Properties</title>
<script src="/util_h.js"></script>
</head>

<body>
<span>User: </span><input type="text" id="elem_user_id" style="width:50px" onfocusout="load_tkn_val();" value="4">
<span id="elem_app" style="font-weight:bold;font-style:italic;color:blue;margin-left:25px;"></span>
<br><br>
<span onclick="this.nextElementSibling.disabled = 0;">Prop1: </span> <input type="text" id="elem_client_id" style="width:270px" onfocusout="set_ls(this,1);" disabled> 
<br><br>
<span onclick="this.nextElementSibling.disabled = 0;">Prop2: </span> <input type="text" id="elem_client_secret" style="width:270px" onfocusout="set_ls(this,1);" disabled> 
<br><br>
<span onclick="this.nextElementSibling.disabled = 0;">Prop3: </span>  <input type="text" id="elem_ref_tkn" style="width:270px" onfocusout="set_ls(this,1);" disabled> 
<br><br>
<span onclick="this.nextElementSibling.disabled = 0;">Prop4: </span><input type="text" id="elem_acc_tkn" style="width:270px" onfocusout="set_ls(this,1);" disabled> 
<br><br>
<span onclick="this.nextElementSibling.disabled = 0;">Prop5: </span><input  type="text" id="elem_dttm_exp" style="width:270px" onfocusout="set_ls(this,1);" disabled>  
<br><br><br>
<button type="button" onclick="this.nextElementSibling.click()">Up Conf</button>
<input type="file" accept=".json, .txt" style="display:none" onchange="read_conf(this);">
<pre id="elem_props"></pre>
<br>
<button type="button" onclick="test(this);">Test</button>
<span style="font-weight:bold;font-style:italic;">Tkn</span>

<script>

function set_ls(elem, opt)
{
 if (opt){
  elem.disabled = 1;
  return localStorage.setItem(pref_app + "_" + get_usr() + "_" + elem.id.replace("elem_", ""), elem.value.trim()); 
 }
 var elem_nxt = elem.nextElementSibling;
 localStorage.setItem(pref_app + "_" + elem_nxt.id.replace("elem_", ""), elem_nxt.value.trim()); 
}

function read_conf(elem)
{
const reader = new FileReader();
reader.readAsText(elem.files[0], "UTF-8");
reader.onload = (event) => {
 var conf_txt = event.target.result;
 var conf_obj = JSON.parse(conf_txt);
 var conk_keys_arr = Object.keys(conf_obj);
 conk_keys_arr.forEach(k => localStorage.setItem(k, conf_obj[k])); 
 var html_props = "Confs: <br>";
 for (i = 0; i < conk_keys_arr.length; i++) html_props += conk_keys_arr[i] + " => " + localStorage.getItem(conk_keys_arr[i]) + "<br>";
 elem_props.innerHTML = html_props; 
}
reader.onerror = (error) => alert("error reading file");
elem.previousElementSibling.innerHTML = "OK";
}

function get_usr()
{
 return "u" + elem_user_id.value.trim();
}

function load_tkn_val()
{
elem_client_id.value = localStorage.getItem(pref_app + "_client_id") || ""; 
elem_client_secret.value = localStorage.getItem(pref_app + "_client_secret") || ""; 
elem_ref_tkn.value = localStorage.getItem(pref_app + "_" + get_usr() + "_ref_tkn") || ""; 
elem_acc_tkn.value = localStorage.getItem(pref_app + "_" + get_usr() + "_acc_tkn") || ""; 
elem_dttm_exp.value = localStorage.getItem(pref_app + "_" + get_usr() + "_dttm_exp") || ""; 
}

function test(elem)
{
 if (elem_ref_tkn.value == "" || elem_acc_tkn.value == "" || elem_dttm_exp.value == "") return alert("Empty...");
 get_tkn(t => {
    elem.nextElementSibling.innerHTML = t;
 }, pref_app, get_usr());

}

var pref_app = "gw";
elem_app.innerHTML = "App: " + pref_app;
load_tkn_val();

</script>

</body>
</html>
